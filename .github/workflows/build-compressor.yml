name: Build Compressors

permissions:
  contents: write

on:
  push:
    branches: [master, support/php-8.4]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  windows-build:
    name: Windows MinSizeRel
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure (MinSizeRel)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=MinSizeRel

      - name: Build compressor.dll
        run: cmake --build build --config MinSizeRel --target compressor -j 8

      - name: Upload Windows DLL
        uses: actions/upload-artifact@v4
        with:
          name: windows-compressor
          path: build/MinSizeRel/compressor.dll

  macos-build:
    name: macOS Release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build compressor.dylib
        run: cmake --build build --target compressor -j 8

      - name: Upload macOS dylib
        uses: actions/upload-artifact@v4
        with:
          name: macos-compressor
          path: build/libcompressor.dylib
  
  wsl-build:
    name: WSL Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Run WSL-like environment in Docker
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace -e DEBIAN_FRONTEND=noninteractive ubuntu:20.04 bash -c "\
            apt-get update && \
            apt-get install -y build-essential cmake && \
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && \
            cmake --build build --target compressor -j 8"

      - name: Upload WSL compressor shared library
        uses: actions/upload-artifact@v4
        with:
          name: wsl-compressor
          path: build/libcompressor.so

  linux-build:
    name: Linux Release & UPX pack
    runs-on: ubuntu-latest
    needs: [windows-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-compressor
          path: artifacts/windows

      - name: Download macOS dylib artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-compressor
          path: artifacts/macos

      - name: Download WSL shared library artifact
        uses: actions/download-artifact@v4
        with:
          name: wsl-compressor
          path: artifacts/wsl

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build linux compressor shared library
        run: cmake --build build --target compressor -j 8

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx

      - name: Compress shared libraries with UPX
        run: |
          cp artifacts/windows/compressor.dll build/compressor.dll
          upx --best --lzma build/compressor.dll

      - name: Copy compressed shared library to src/bin
        run: |
          mkdir -p src/bin
          cp build/libcompressor.so src/bin/libcompressor.so
          cp build/compressor.dll src/bin/compressor.dll

      - name: Upload Linux shared library
        uses: actions/upload-artifact@v4
        with:
          name: linux-compressor
          path: src/bin/libcompressor.so

      - name: Commit and push updated shared libraries
        if: github.event_name == 'push' && github.ref == 'refs/heads/support/php-8.4'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ${GITHUB_REF#refs/heads/}
          git reset --hard origin/${GITHUB_REF#refs/heads/}
          git add src/bin/libcompressor.so src/bin/compressor.dll
          if git diff --cached --quiet; then
            echo "No shared library updates to commit"
            exit 0
          fi
          git commit -m "ci: update compressor shared libraries [skip ci]"
          git push origin HEAD:${GITHUB_REF#refs/heads/}

      - name: Attach shared libraries to release
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src/bin/libcompressor.so
            src/bin/compressor.dll
            artifacts/macos/libcompressor.dylib
            artifacts/wsl/libcompressor.so
